<!DOCTYPE html>
<html lang="it" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- description and title are populated dynamically from js/content.js -->
  <meta name="description" content="" />
  <meta name="keywords" content="Mariaceleste Picanza, giurista, food law, diritto ambientale, LUISS, LUMSA, avvocato, portfolio legale" />
  <meta property="og:type" content="website" />
  <title>Mariaceleste Picanza</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231B2E4B'/><text x='50%' y='54%' dominant-baseline='middle' text-anchor='middle' font-family='serif' font-size='15' fill='%23C9A84C' font-weight='bold'>MP</text></svg>" />
</head>
<body>

  <!-- â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• NAVBAR â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar__inner">

      <a href="#hero" class="navbar__logo">M.<span>P</span>.</a>

      <!-- Desktop menu -->
      <ul class="navbar__menu" role="list">
        <li><a href="#about"     class="navbar__link" data-key="nav.about"></a></li>
        <li><a href="#skills"    class="navbar__link" data-key="nav.skills"></a></li>
        <li><a href="#education" class="navbar__link" data-key="nav.education"></a></li>
        <li><a href="#portfolio" class="navbar__link" data-key="nav.portfolio"></a></li>
        <li><a href="#contacts"  class="navbar__link" data-key="nav.contacts"></a></li>
        <li>
          <div class="lang-toggle" role="group" aria-label="Language selector">
            <button class="lang-btn active" data-lang="it" aria-label="Italiano">IT</button>
            <button class="lang-btn"        data-lang="en" aria-label="English">EN</button>
          </div>
        </li>
      </ul>

      <!-- Hamburger (mobile) -->
      <button class="navbar__hamburger" aria-label="Toggle menu" aria-expanded="false" aria-controls="mobile-menu">
        <span></span><span></span><span></span>
      </button>

    </div>
  </nav>

  <!-- Mobile menu -->
  <div class="navbar__mobile-menu" id="mobile-menu" role="menu">
    <a href="#about"     class="navbar__link" data-key="nav.about"></a>
    <a href="#skills"    class="navbar__link" data-key="nav.skills"></a>
    <a href="#education" class="navbar__link" data-key="nav.education"></a>
    <a href="#portfolio" class="navbar__link" data-key="nav.portfolio"></a>
    <a href="#contacts"  class="navbar__link" data-key="nav.contacts"></a>
    <div class="lang-toggle" role="group" aria-label="Language selector">
      <button class="lang-btn active" data-lang="it">IT</button>
      <button class="lang-btn"        data-lang="en">EN</button>
    </div>
  </div>


  <!-- â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• HERO â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• -->
  <section id="hero" class="hero" aria-labelledby="hero-name">
    <div class="hero__content">
      <span class="hero__eyebrow" data-key="hero.eyebrow"></span>
      <h1 id="hero-name" class="hero__name">Mariaceleste Picanza</h1>
      <div class="hero__line" aria-hidden="true"></div>
      <p class="hero__tagline"  data-key="hero.tagline"></p>
      <p class="hero__subtitle" data-key="hero.subtitle"></p>
      <a href="#about" class="hero__cta" data-key="hero.cta"></a>
    </div>
  </section>


  <!-- â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• ABOUT â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• -->
  <section id="about" class="section" aria-labelledby="about-title">
    <div class="container">

      <span class="section__label" data-key="about.label"></span>
      <h2 id="about-title" class="section__title" data-key="about.title"></h2>
      <div class="divider" aria-hidden="true"></div>

      <div class="about__grid">

        <!-- Bio: HTML content injected from content.js -->
        <div class="about__bio fade-up" data-key="about.bio" data-html></div>

        <div class="about__right fade-up">
          <blockquote class="about__quote" data-key="about.quote"></blockquote>
          <!-- Facts: dynamically rendered by main.js from CONTENT.about.facts -->
          <div class="about__facts" id="about-facts"></div>
        </div>

      </div>
    </div>
  </section>


  <!-- â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• SKILLS â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• -->
  <section id="skills" class="section section--alt" aria-labelledby="skills-title">
    <div class="container">

      <span class="section__label" data-key="skills.label"></span>
      <h2 id="skills-title" class="section__title" data-key="skills.title"></h2>
      <div class="divider" aria-hidden="true"></div>

      <p class="skills__intro fade-up" data-key="skills.intro"></p>

      <!-- Skill cards: dynamically rendered by main.js from CONTENT.skills.cards -->
      <div id="skills-grid" class="skills__grid"></div>

      <div class="fade-up" style="margin-top:3rem;">
        <h3 class="soft-skills__title" data-key="skills.softSkillsTitle"></h3>
        <div class="divider" aria-hidden="true"></div>
        <!-- Soft skill tags: dynamically rendered by main.js from CONTENT.skills.softSkills -->
        <div id="soft-skills" class="soft-skills__grid"></div>
      </div>

    </div>
  </section>


  <!-- â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• EDUCATION â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• -->
  <section id="education" class="section" aria-labelledby="education-title">
    <div class="container">

      <span class="section__label" data-key="education.label"></span>
      <h2 id="education-title" class="section__title" data-key="education.title"></h2>
      <div class="divider" aria-hidden="true"></div>

      <!-- Timeline items: dynamically rendered by main.js from CONTENT.education.items -->
      <div id="education-timeline" class="education__timeline fade-up"></div>

    </div>
  </section>


  <!-- â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• PORTFOLIO â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• -->
  <section id="portfolio" class="section section--alt" aria-labelledby="portfolio-title">
    <div class="container">

      <span class="section__label" data-key="portfolio.label"></span>
      <h2 id="portfolio-title" class="section__title" data-key="portfolio.title"></h2>
      <div class="divider" aria-hidden="true"></div>

      <!-- Portfolio cards: dynamically rendered from CONTENT.portfolio.cards -->
      <div id="portfolio-grid" class="portfolio__grid"></div>

      <!-- Certs & Awards: dynamically rendered from CONTENT.portfolio.certs / .awards -->
      <div id="certs-awards" class="certs-awards__grid fade-up"></div>

    </div>
  </section>


  <!-- â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• CONTACTS â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• -->
  <section id="contacts" class="section" aria-labelledby="contacts-title">
    <div class="container">

      <span class="section__label" data-key="contacts.label"></span>
      <h2 id="contacts-title" class="section__title" data-key="contacts.title"></h2>
      <div class="divider" aria-hidden="true"></div>

      <div class="contacts__grid">

        <div class="contacts__info fade-up">

          <!-- Location -->
          <div class="contacts__item">
            <div class="contacts__item-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
              </svg>
            </div>
            <div>
              <div class="contacts__item-label" data-key="contacts.locationLabel"></div>
              <div class="contacts__item-value" data-key="contacts.locationValue"></div>
            </div>
          </div>

          <!-- LinkedIn â€” MANDATORY LINK -->
          <div class="contacts__item">
            <div class="contacts__item-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
              </svg>
            </div>
            <div>
              <div class="contacts__item-label" data-key="contacts.linkedinLabel"></div>
              <div class="contacts__item-value">
                <a href="https://www.linkedin.com/in/mariaceleste-picanza-69202a360/"
                   target="_blank"
                   rel="noopener noreferrer"
                   id="linkedin-link"
                   data-key="contacts.linkedinText"></a>
              </div>
            </div>
          </div>

          <!-- LinkedIn CTA button -->
          <a href="https://www.linkedin.com/in/mariaceleste-picanza-69202a360/"
             target="_blank"
             rel="noopener noreferrer"
             class="linkedin-cta"
             id="linkedin-cta">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
            <span data-key="contacts.ctaText"></span>
          </a>

        </div>

        <div class="fade-up" style="padding-top:0.5rem;">

          <p class="contacts__note" data-key="contacts.note"></p>

          <!-- Third-person bio box -->
          <div style="margin-top:2rem;padding:2rem;background:var(--color-bg-alt);border-radius:var(--radius);border:1px solid var(--color-border);">
            <div class="contacts__bio-third-label" data-key="contacts.bioThirdLabel"></div>
            <p class="contacts__bio-third-text" data-key="contacts.bioThird"></p>
          </div>

        </div>

      </div>
    </div>
  </section>


  <!-- â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• FOOTER â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• -->
  <footer class="footer" role="contentinfo">
    <p>
      &copy; <span id="current-year"></span> Mariaceleste Picanza &nbsp;&middot;&nbsp;
      <a href="https://www.linkedin.com/in/mariaceleste-picanza-69202a360/"
         target="_blank"
         rel="noopener noreferrer">LinkedIn</a>
      &nbsp;&middot;&nbsp;
      <span data-key="footer.location"></span>
    </p>
  </footer>


  <!-- Scroll to top -->
  <button class="scroll-top" aria-label="Torna in cima alla pagina">
    <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>


  <!-- content.js must load before main.js -->
  <script src="js/content.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
